<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="charts">

    <div class="chart-box">
        <h3>📊 CA par catégorie</h3>
        <canvas id="catChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>👥 Répartition par genre</h3>
        <canvas id="genderChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>📈 Évolution des ventes</h3>
        <canvas id="timeChart"></canvas>
    </div>

</div>

<script>
/* ⚠️ Données temporaires (tu peux les remplacer par Python plus tard) */
const categories = ["Clothing", "Beauty", "Electronics"];
const ca_categories = [3000, 2500, 4000];

const genders = ["Male", "Female"];
const ca_gender = [5000, 4500];

const dates = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin"];
const ca_time = [2000, 3000, 2500, 4000, 3500, 5000];

/* 📊 Graphique 1 : catégories */
new Chart(document.getElementById("catChart"), {
    type: "bar",
    data: {
        labels: categories,
        datasets: [{
            label: "Chiffre d'affaires (€)",
            data: ca_categories,
            backgroundColor: ["#4facfe", "#00f2fe", "#2a5298"]
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        }
    }
});

/* 🥧 Graphique 2 : genre */
new Chart(document.getElementById("genderChart"), {
    type: "pie",
    data: {
        labels: genders,
        datasets: [{
            data: ca_gender,
            backgroundColor: ["#ff6a88", "#36d1dc"]
        }]
    }
});

/* 📈 Graphique 3 : évolution */
new Chart(document.getElementById("timeChart"), {
    type: "line",
    data: {
        labels: dates,
        datasets: [{
            label: "CA (€)",
            data: ca_time,
            borderColor: "#2a5298",
            backgroundColor: "rgba(42,82,152,0.2)",
            fill: true,
            tension: 0.3
        }]
    }
});
</script>
