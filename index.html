<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse des Ventes E-commerce</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Style CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        header {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .hero {
            padding: 80px 50px;
            text-align: center;
            background: white;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 20px;
            color: #1e3c72;
        }

        .hero p {
            font-size: 18px;
            color: #555;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 50px;
            background: #f4f6f9;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 250px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-size: 28px;
            color: #2a5298;
        }

        .chart-section {
            padding: 50px;
            background: white;
            text-align: center;
        }

        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Analyse E-commerce</h1>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Statistiques</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Tableau de Bord des Ventes</h2>
        <p>Analyse complète des performances commerciales de votre boutique en ligne.</p>
    </section>

    <section class="stats">
        <div class="card">
            <h3>12 540 €</h3>
            <p>Chiffre d'affaires</p>
        </div>

        <div class="card">
            <h3>320</h3>
            <p>Commandes</p>
        </div>

        <div class="card">
            <h3>150</h3>
            <p>Clients</p>
        </div>
    </section>

    <section class="chart-section">
        <h2>Évolution des ventes</h2>
        <canvas id="salesChart" width="600" height="300"></canvas>
    </section>

    <footer>
        © 2026 Analyse des ventes E-commerce | Projet Data
    </footer>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('salesChart').getContext('2d');
        const salesChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin'],
                datasets: [{
                    label: 'Ventes (€)',
                    data: [2000, 3000, 2500, 4000, 3500, 5000],
                    borderColor: '#2a5298',
                    backgroundColor: 'rgba(42,82,152,0.2)',
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: {
                responsive: true
            }
        });
    </script>

</body>
</html>
